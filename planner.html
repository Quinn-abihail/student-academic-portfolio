<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Planner | Regina Abihail Enudi</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-glow-2"></div>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">Regina<span>.</span></a>
            <button class="mobile-menu-btn" aria-label="Toggle menu">&#9776;</button>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Me</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="planner.html" class="active">Academic Planner</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="section">
            <h2>Academic Planner</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Stay on top of your assignments, readings, and project deadlines for this semester.</p>

            <div class="planner-wrapper glass-card">
                
                <div class="planner-stats">
                    <div class="stat-item">
                        <span class="stat-value" id="total-tasks">0</span>
                        <span class="stat-label">Total Tasks</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="pending-tasks">0</span>
                        <span class="stat-label">Pending</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="completed-tasks">0</span>
                        <span class="stat-label">Completed</span>
                    </div>
                </div>

                <form class="planner-form" id="planner-form">
                    <input type="text" id="task-input" class="planner-input" placeholder="e.g. Complete Data Cleaning Assignment..." autocomplete="off">
                    <button type="submit" id="add-task-btn" class="btn btn-primary">Add Task</button>
                </form>

                <ul id="task-list" class="task-list">
                    <!-- Tasks will be rendered here dynamically via JS -->
                </ul>
                
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Regina Abihail Enudi. COS 106 Term Project - Miva Open University.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script src="js/planner.js"></script>
</body>
</html>
